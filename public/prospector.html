  <script>
    // Auth guard: redirect to login if no token or expired token
    (function() {
      const token = localStorage.getItem('auth_token');
      if (!token) { window.location.href = '/prospector-login'; return; }
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.exp * 1000 < Date.now()) {
          // Token expired — clean up and redirect
          ['auth_token','account_id','account_name','is_admin','switch_account_id','switch_account_name'].forEach(k => localStorage.removeItem(k));
          window.location.href = '/prospector-login';
        }
      } catch (e) {
        window.location.href = '/prospector-login';
      }
    })();
  </script>

<!-- Global fetch wrapper: inject Bearer token + X-Switch-Account on all /api/ calls -->
<script>
const originalFetch = window.fetch;
window.fetch = function(url, options = {}) {
  if (typeof url === 'string' && url.includes('/api/')) {
    const token = AccountContext.getToken();
    const headers = { ...(options.headers || {}) };

    // Always inject Bearer token
    if (token && !headers['Authorization']) {
      headers['Authorization'] = `Bearer ${token}`;
    }

    // If admin is viewing another account, inject X-Switch-Account
    const switchId = accountContext.getSwitchAccountId();
    if (switchId && !headers['X-Switch-Account']) {
      headers['X-Switch-Account'] = switchId;
    }

    options = { ...options, headers };
  }

  return originalFetch.call(this, url, options).then(response => {
    // 401 = token expired/invalid → redirect to login
    if (response.status === 401) {
      AccountContext.logout();
    }
    return response;
  });
};
</script>

<!-- Account Switcher Button & Badge Update -->
<script>
// Update header when account is selected
function updateHeaderWithAccount(account) {
  const btn = document.getElementById('accountSwitchBtn');
  const name = document.getElementById('currentAccountName');
  if (account) {
    name.textContent = account.name;
    // Only show switch button if user is admin
    btn.style.display = accountContext.getIsAdmin() ? 'flex' : 'none';
  } else {
    btn.style.display = 'none';
    name.textContent = '';
  }
}

// Update header on any account change
document.addEventListener('account-changed', (e) => {
  updateHeaderWithAccount(e.detail);
});

// Initialization
document.addEventListener('DOMContentLoaded', () => {
  // Account info comes from localStorage (set by LoginPage.jsx after PIN login)
  // accountContext constructor already reads account_id, account_name, is_admin
  if (!accountContext.isAccountSelected()) {
    // No account info → redirect to login
    AccountContext.logout();
    return;
  }

  // Clean URL (remove ?account_id= param if present)
  if (window.location.search.includes('account_id')) {
    window.history.replaceState({}, '', '/prospector');
  }

  // Show account name + init app
  updateHeaderWithAccount(accountContext.getAccount());
  App.init();

  // Logout button
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    AccountContext.logout();
  });

  // Account switcher button (admin only)
  document.getElementById('accountSwitchBtn')?.addEventListener('click', () => {
    if (!accountContext.getIsAdmin()) return;
    const selector = new AccountSelector();
    selector.show();
  });
});
</script>
